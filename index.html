            font-size: 1.1rem;
            color: #2d3e4a;

            flex-wrap: wrap;

            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            background: #fff9f2;
            padding: 1.2rem 2rem;
            border-radius: 60px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
        }
        .search-box {
            flex: 2;
            min-width: 260px;
        }
        .search-box input {
            width: 100%;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 40px;
            background: #ffffff;
            font-size: 1rem;
            box-shadow: inset 0 2px 6px #e2d9d0;
            outline: 2px solid transparent;
            transition: 0.2s;
        }
        .search-box input:focus {
            outline: 2px solid #b67e6b;
        }
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex: 3;
            justify-content: flex-end;
        }
        .filter-btn {
            background: transparent;
            border: 1.5px solid #c7b4a2;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #4f3f33;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: #b67e6b;
            border-color: #b67e6b;
            color: white;
        }
        .filter-btn:hover {
            background: #dac1b0;
            border-color: #a5725e;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.8rem;
            align-items: start;
        }
        .card {
            background: white;
            border-radius: 28px 12px 28px 12px;
            box-shadow: 0 12px 28px -8px rgba(28, 28, 30, 0.15);
            overflow: hidden;
            border: 1px solid #ece4da;
            height: fit-content;
        }
        .card-header {
            background: #e7ded5;
            padding: 0.9rem 1.5rem;
            font-weight: 600;
            font-size: 1.5rem;
            color: #3b2e24;
            border-bottom: 2px solid #c7b4a2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header span:first-child {
            font-size: 1.9rem;
        }
        .card-header .count {
            font-size: 0.9rem;
            background: #cfb8a8;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #2d3e2d;
            margin-left: auto;
        }
        .card-content {
            padding: 1.2rem 1rem 1rem 1rem;
            background: #fefcf9;
            max-height: 600px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .card-content::-webkit-scrollbar {
            width: 6px;
        }
        .card-content::-webkit-scrollbar-thumb {
            background: #c7b4a2;
            border-radius: 20px;
        }
        .vocab-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.94rem;
        }
        .vocab-table th {
            text-align: left;
            font-weight: 500;
            color: #7b5e4b;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #d9cec2;
        }
        .vocab-table td {
            padding: 0.4rem 0.2rem 0.4rem 0;
            border-bottom: 1px solid #eee9e2;
            vertical-align: baseline;
        }
        .vocab-table tr:last-child td {
            border-bottom: none;
        }
        .hanzi {
            font-size: 1.4rem;
            font-weight: 500;
            font-family: 'Noto Sans SC', sans-serif;
            color: #1d3b4e;
            width: 15%;

            color: #526f7a;
            font-size: 0.9rem;
            width: 18%;
        }
        .rus-trans {
            color: #3f5463;
            width: 22%;

            padding: 3rem;

            border-radius: 60px;

        }

        { cat: 'misc', hanzi: '前面', pinyin: 'qiánmiàn', rusTrans: 'цяньмянь', translation: 'спереди' },
        { cat: 'sport', hanzi: '体育馆', pinyin: 'tǐyùguǎn', rusTrans: 'тиюйгуань', translation: 'спортзал' },
        { cat: 'sport', hanzi: '游泳池', pinyin: 'yóuyǒngchí', rusTrans: 'ююнчи', translation: 'бассейн' },
        { cat: 'misc', hanzi: '活动', pinyin: 'huódòng', rusTrans: 'ходун', translation: 'мероприятие' },
        { cat: 'time', hanzi: '晚上', pinyin: 'wǎnshang', rusTrans: 'ваньшан', translation: 'вечер' },
        { cat: 'verbs', hanzi: '参加', pinyin: 'cānjiā', rusTrans: 'цаньцзя', translation: 'участвовать' }
    ];

    // Категории с метаданными (расширенные)
    const categoryMeta = [
        { id: 'food', emoji: '🥢', title: 'Еда и напитки' },
        { id: 'family', emoji: '👨‍👩‍👧', title: 'Семья' },
        { id: 'home', emoji: '🏠', title: 'Дом и интерьер' },
        { id: 'city', emoji: '🚌', title: 'Город и транспорт' },
        { id: 'sport', emoji: '⚽', title: 'Спорт' },
        { id: 'time', emoji: '⏳', title: 'Время' },
        { id: 'study', emoji: '📖', title: 'Учеба' },
        { id: 'adj', emoji: '✨', title: 'Описания' },
        { id: 'verbs', emoji: '🔧', title: 'Глаголы' },
        { id: 'health', emoji: '💊', title: 'Здоровье' },
        { id: 'animals', emoji: '🐾', title: 'Животные' },
        { id: 'nature', emoji: '🌿', title: 'Природа' },
        { id: 'travel', emoji: '🧳', title: 'Путешествия' },
        { id: 'music', emoji: '🎵', title: 'Музыка' },
        { id: 'clothing', emoji: '👕', title: 'Одежда' },
        { id: 'tech', emoji: '💻', title: 'Технологии' },
        { id: 'gift', emoji: '🎁', title: 'Праздники' },
        { id: 'misc', emoji: '📦', title: 'Прочее' }
    ];

    // DOM элементы
    const gridEl = document.getElementById('categoryGrid');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const totalStats = document.getElementById('totalStats');
    
    let activeCategory = 'all';
    let searchQuery = '';

    // Обновление счетчика
    totalStats.textContent = `📊 ${vocabData.length} слов`;

    function filterData() {
        return vocabData.filter(item => {
            if (activeCategory !== 'all' && item.cat !== activeCategory) return false;
            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase();
                return (item.hanzi + item.pinyin + item.rusTrans + item.translation).toLowerCase().includes(q);
            }
            return true;
        });
    }

    function render() {
        const filtered = filterData();
        const grouped = new Map();
        categoryMeta.forEach(meta => grouped.set(meta.id, []));

        filtered.forEach(item => {
            const arr = grouped.get(item.cat);
            if (arr) arr.push(item);
        });

        let htmlString = '';
        for (let meta of categoryMeta) {
            const items = grouped.get(meta.id) || [];
            if (items.length === 0) continue;

            const rows = items.map(v => `<tr>
                <td class="hanzi">${v.hanzi}</td>
                <td class="pinyin">${v.pinyin}</td>
                <td class="rus-trans">${v.rusTrans}</td>
                <td class="translation">${v.translation}</td>
            </tr>`).join('');

            htmlString += `
                <div class="card">
                    <div class="card-header">
                        <span>${meta.emoji}</span> ${meta.title}
                        <span class="count">${items.length}</span>
                    </div>
                    <div class="card-content">
                        <table class="vocab-table">
                            <tr><th>Иероглиф</th><th>Пининь</th><th>Транскрипция</th><th>Перевод</th></tr>
                            ${rows}
                        </table>
                    </div>
                </div>
            `;
        }

        if (htmlString === '') {
            gridEl.innerHTML = `<div class="no-match-message">😕 Ничего не найдено по запросу «${searchQuery}»</div>`;
        } else {
            gridEl.innerHTML = htmlString;
        }
        totalStats.textContent = `📊 ${filtered.length} / ${vocabData.length} слов`;
    }

    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        render();
    });

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.dataset.category;
            render();
        });
    });

    render();
})();
</script>
</body>
</html>
